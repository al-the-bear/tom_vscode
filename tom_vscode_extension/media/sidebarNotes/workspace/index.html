<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" href="{{sharedUri}}/notepadBase.css">
<link rel="stylesheet" href="{{baseUri}}/style.css">
</head>
<body>
<div id="headerBar" class="toolbar" style="display:none;">
<div class="ws-header" id="wsHeader"></div>
<div class="toolbar-row">
<select id="templateSelect"></select>
<span id="fileName" class="file-name"></span>
<button class="icon-btn" id="previewPromptBtn" title="Prompt Preview">🧠</button>
<button class="icon-btn" id="previewMarkdownBtn" title="Preview Markdown">👁️</button>
<button class="primary icon-btn" id="sendBtn" title="Send to Copilot">➤</button>
<button class="icon-btn" id="changeFileBtn" title="Change file...">📁</button>
<button class="icon-btn" id="openBtn" title="Open in Editor">📄</button>
</div>
</div>
<div id="noWorkspace" class="empty-state" style="display:none;">
<div class="message">No workspace is open</div>
<button class="primary" id="openWorkspaceBtn">Open Workspace...</button>
</div>
<div id="noFile" class="empty-state" style="display:none;">
<div class="message">No workspace notes file configured</div>
<button class="primary" id="createFileBtn">Create Notes File</button>
<button id="selectFileBtn">Select Existing File...</button>
</div>
<textarea id="content" style="display:none;" placeholder="Workspace notes..." data-completion="on"></textarea>
<div id="statusBar" class="status-bar" style="display:none;">
<span id="charCount">0 chars</span>
</div>
<script src="{{baseUri}}/main.js"></script>
<script src="{{sharedUri}}/completion.js"></script>
</body>
</html>
