name: vscode_scripting_advanced_sample
description: >-
  Advanced tom_vscode_scripting_api sample — beyond the first calls: live
  editor edits, batched file operations, long-running progress reporting,
  interactive quick-pick / input flows, the language-model (Copilot) API, and
  the ergonomic VsCodeHelper static layer. Builds on the connection and
  run-script conventions established by the introduction sample.
version: 1.0.0
publish_to: none

environment:
  sdk: ^3.5.0

dependencies:
  tom_vscode_scripting_api: ">=1.1.0"

dev_dependencies:
  lints: ^4.0.0
  test: ^1.25.0
